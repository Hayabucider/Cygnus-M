<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cygnus-M Definitive Layers Viewer</title>
<style>
:root{
  --font-sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --color-text-primary:#f8fafc;
  --color-text-secondary:#cbd5e1;
  --color-text-tertiary:#94a3b8;
  --color-border-secondary:#475569;
  --color-border-tertiary:#334155;
  --color-background-primary:#1e293b;
  --color-background-secondary:#111827;
  --card:#0f172a;
  --accent:#f59e0b;
  --plain:#263449;
  --mod:#1d4ed8;
  --layer:#047857;
  --sym:#6d28d9;
  --change:#d97706;
  --macro:#7c3aed;
  --mouse:#be185d;
  --bt:#0f766e;
  --danger:#dc2626;
  --trans:#111827;
  --home:#0ea5e9;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 0%,rgba(14,165,233,.22),transparent 30rem),
    radial-gradient(circle at 82% 12%,rgba(245,158,11,.18),transparent 28rem),
    linear-gradient(180deg,#0b1020 0%,#111827 100%);
  color:var(--color-text-primary);
  font-family:var(--font-sans);
}

.page{
  width:min(1320px,calc(100vw - 28px));
  margin:0 auto;
  padding:28px 0 44px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
  margin-bottom:18px;
}

.hero h1{
  margin:0 0 8px;
  font-size:clamp(24px,3vw,38px);
  letter-spacing:.02em;
}

.hero p{
  margin:0;
  color:var(--color-text-tertiary);
  line-height:1.7;
}

.badge{
  border:1px solid rgba(245,158,11,.55);
  background:rgba(245,158,11,.12);
  color:#fde68a;
  border-radius:999px;
  padding:9px 12px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:0 0 14px;
}

.tab-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  width:100%;
}

button{
  border:1px solid rgba(148,163,184,.32);
  border-radius:999px;
  background:#1e293b;
  color:var(--color-text-primary);
  padding:9px 12px;
  font-weight:900;
  cursor:pointer;
}

button.active{
  background:#f59e0b;
  border-color:#fde68a;
  color:#111827;
}

button.secondary{
  margin-left:auto;
  background:#020617;
}

.layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 340px;
  gap:14px;
  align-items:start;
}

.kb-shell,.side-card,.review-card{
  background:rgba(15,23,42,.9);
  border:1px solid rgba(148,163,184,.28);
  border-radius:18px;
  box-shadow:0 22px 60px rgba(0,0,0,.32);
}

.kb-shell{overflow:hidden}

.kb-head{
  padding:16px 18px;
  background:linear-gradient(90deg,rgba(30,41,59,.92),rgba(15,23,42,.75));
  border-bottom:1px solid rgba(148,163,184,.22);
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}

.kb-head strong{
  display:block;
  font-size:15px;
  margin-bottom:4px;
}

.kb-head span{
  color:var(--color-text-tertiary);
  font-size:12px;
}

.legend{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:flex-end;
}

.legend span{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--color-text-secondary);
  font-size:11px;
  font-weight:700;
}

.dot{
  width:13px;
  height:13px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,.32);
}

.dot.mod{background:var(--mod)}
.dot.lyr{background:var(--layer)}
.dot.sym{background:var(--sym)}
.dot.macro{background:var(--macro)}
.dot.bt{background:var(--bt)}
.dot.trans{background:var(--trans)}

.kb{
  font-family:var(--font-sans);
  padding:20px 18px 18px;
  overflow-x:auto;
}

.ht{
  font-size:14px;
  font-weight:800;
  color:var(--color-text-primary);
  margin:0 0 12px;
}

.hl{
  font-size:11px;
  font-weight:800;
  color:#fde68a;
  margin:0 0 8px;
  letter-spacing:.08em;
}

.hands-row{
  display:flex;
  align-items:flex-start;
  gap:28px;
  min-width:max-content;
}

.hand-panel{
  border:1px solid rgba(148,163,184,.18);
  border-radius:16px;
  background:rgba(2,6,23,.18);
  padding:14px;
}

.hand-panel.left{padding-right:16px}
.hand-panel.right{padding-left:16px}

.cols{
  display:flex;
  gap:3px;
  align-items:flex-start;
}

.col{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.thumbs{
  display:flex;
  gap:3px;
  align-items:center;
  margin-top:4px;
}

.left-thumbs{
  padding-left:198px;
}

.right-thumbs{
  padding-left:90px;
}

.k{
  width:48px;
  min-height:48px;
  border-radius:10px;
  border:1px solid rgba(148,163,184,.6);
  border-bottom-width:4px;
  background:linear-gradient(180deg,#334155,#243247);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  flex-shrink:0;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
  padding:4px;
  text-align:center;
}

.k .t{
  font-size:8px;
  color:rgba(255,255,255,.74);
  line-height:1;
  position:absolute;
  top:5px;
  width:100%;
  text-align:center;
  font-weight:800;
}

.k .m{
  font-size:12px;
  font-weight:900;
  color:var(--color-text-primary);
  line-height:1.05;
  letter-spacing:.01em;
}

.k .zmk{
  display:none;
  margin-top:4px;
  color:rgba(255,255,255,.62);
  font-size:7px;
  line-height:1.05;
  word-break:break-all;
}

body.show-zmk .k{
  min-height:64px;
}

body.show-zmk .k .zmk{
  display:block;
}

.k.mod{
  background:linear-gradient(180deg,#2563eb,#1d4ed8);
  border-color:#60a5fa;
}

.k.lyr{
  background:linear-gradient(180deg,#059669,#047857);
  border-color:#34d399;
}

.k.sym{
  background:linear-gradient(180deg,#7c3aed,#6d28d9);
  border-color:#c4b5fd;
}

.k.chg{
  background:linear-gradient(180deg,#f59e0b,#d97706);
  border-color:#fde68a;
}

.k.chg .m{
  color:#111827;
}

.k.macro{
  background:linear-gradient(180deg,#8b5cf6,#6d28d9);
  border-color:#c4b5fd;
}

.k.mouse{
  background:linear-gradient(180deg,#db2777,#be185d);
  border-color:#f9a8d4;
}

.k.bt{
  background:linear-gradient(180deg,#14b8a6,#0f766e);
  border-color:#5eead4;
}

.k.danger{
  background:linear-gradient(180deg,#ef4444,#b91c1c);
  border-color:#fecaca;
}

.k.trans{
  background:#111827;
  border-color:#475569;
  border-style:dashed;
  opacity:.48;
}

.k.home{
  border-color:#7dd3fc;
  border-width:2px;
  box-shadow:0 0 0 2px rgba(14,165,233,.18),0 8px 18px rgba(0,0,0,.18);
}

.k.flag::after{
  content:attr(data-flag);
  position:absolute;
  top:-7px;
  right:-7px;
  min-width:20px;
  height:20px;
  border-radius:999px;
  display:grid;
  place-items:center;
  border:2px solid #0f172a;
  background:#fde68a;
  color:#111827;
  font-size:11px;
  font-weight:900;
}

.trackball{
  width:52px;
  height:52px;
  border-radius:50%;
  border:1px solid #fbbf24;
  background:radial-gradient(circle at 35% 30%,#fff7ed 0,#fde68a 36%,#d97706 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7px;
  color:#3b2504;
  font-weight:900;
  text-align:center;
  line-height:1.25;
  flex-shrink:0;
  box-shadow:inset 0 3px 7px rgba(255,255,255,.45),0 8px 22px rgba(0,0,0,.28);
}

.note{
  margin-top:16px;
  background:rgba(15,23,42,.76);
  border-radius:14px;
  padding:14px 16px;
  font-size:12px;
  color:var(--color-text-secondary);
  line-height:1.8;
  border:1px solid rgba(148,163,184,.24);
}

.side{
  display:grid;
  gap:14px;
}

.side-card{
  padding:16px;
}

.side-card h2{
  font-size:16px;
  margin:0 0 12px;
}

.summary{
  display:grid;
  gap:10px;
}

.summary-item{
  border-left:5px solid #38bdf8;
  border-radius:10px;
  background:rgba(2,6,23,.32);
  padding:11px 12px;
}

.summary-item.good{border-left-color:#10b981}
.summary-item.warn{border-left-color:#f59e0b}
.summary-item.bad{border-left-color:#ef4444}

.summary-item strong{
  display:block;
  margin-bottom:4px;
}

.summary-item span{
  color:var(--color-text-tertiary);
  font-size:13px;
  line-height:1.65;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  border-bottom:1px solid rgba(148,163,184,.2);
  padding:9px 6px;
  text-align:left;
  vertical-align:top;
}

th{
  color:#fde68a;
}

tr:last-child td{border-bottom:0}

code{
  background:#020617;
  border:1px solid rgba(148,163,184,.24);
  border-radius:6px;
  padding:2px 6px;
  color:#bae6fd;
}

.status{
  margin-top:12px;
  color:var(--color-text-tertiary);
  font-size:12px;
}

@media(max-width:1040px){
  .layout{grid-template-columns:1fr}
}

@media(max-width:760px){
  .hero,.kb-head{align-items:flex-start;flex-direction:column}
  .legend{justify-content:flex-start}
  button.secondary{margin-left:0}
  .k{width:44px}
  .trackball{width:48px;height:48px}
  .hands-row{gap:18px}
  .hand-panel{padding:12px}
}
</style>
</head>
<body>
<main class="page">
  <div class="hero">
    <div>
      <h1>Cygnus-M Layer Viewer</h1>
      <p>definitive v6の横並びデザインをベースに、実keymapのL0-L10を切り替え表示します。</p>
    </div>
    <div class="badge" id="countBadge">checking...</div>
  </div>

  <div class="toolbar" aria-label="layer tabs">
    <div class="tab-group" id="baseTabs"></div>
    <div class="tab-group" id="subTabs"></div>
    <div class="tab-group" id="commonTabs"></div>
    <button class="secondary" id="toggleZmk" type="button">ZMK記法を表示</button>
  </div>

  <div class="layout">
    <section class="kb-shell">
      <div class="kb-head">
        <div>
          <strong id="layerTitle">Layer</strong>
          <span id="layerSubtitle">loading</span>
        </div>
        <div class="legend" aria-label="凡例">
          <span><i class="dot mod"></i>修飾/特殊</span>
          <span><i class="dot lyr"></i>Tap/Hold</span>
          <span><i class="dot sym"></i>IME/Sym</span>
          <span><i class="dot macro"></i>マクロ</span>
          <span><i class="dot bt"></i>BT</span>
          <span><i class="dot trans"></i>透過</span>
        </div>
      </div>

      <div class="kb">
        <p class="ht" id="layerHeading">Layer</p>
        <div class="hands-row">
          <section class="hand-panel left" aria-label="左手用">
            <p class="hl">左手用</p>
            <div class="cols" id="leftMain"></div>
            <div class="thumbs left-thumbs" id="leftThumbs"></div>
          </section>

          <section class="hand-panel right" aria-label="右手用">
            <p class="hl">右手用</p>
            <div class="cols" id="rightMain"></div>
            <div class="thumbs right-thumbs" id="rightThumbs"></div>
          </section>
        </div>

        <div class="note">
          表示は実keymapの51バインドを使用しています。左手下段の <code>英数(LANG2)</code> 長押しでL8、右サム <code>RET</code> 長押し（または <code>MINUS</code> 長押し）でL9に入ります。
        </div>
      </div>
    </section>

    <aside class="side">
      <section class="side-card">
        <h2>このレイヤーの見方</h2>
        <div class="summary" id="summary"></div>
      </section>
      <section class="side-card">
        <h2>エンコーダー</h2>
        <div class="summary" id="encoderSummary"></div>
      </section>
      <section class="side-card">
        <h2>重要キー</h2>
        <table>
          <thead><tr><th>キー</th><th>意味</th></tr></thead>
          <tbody id="importantTable"></tbody>
        </table>
        <div class="status" id="statusText"></div>
      </section>
    </aside>
  </div>
</main>

const encoders = {
  0:{cw:"音量アップ",ccw:"音量ダウン",use:"通常操作の音量調整",zmk:"&inc_dec_kp C_VOL_UP C_VOL_DN"},
  1:{cw:"次タブ",ccw:"前タブ",use:"Windows Subでのタブ移動",zmk:"&inc_dec_kp LC(TAB) LC(LS(TAB))"},
  2:{cw:"音量アップ",ccw:"音量ダウン",use:"通常操作の音量調整",zmk:"&inc_dec_kp C_VOL_UP C_VOL_DN"},
  3:{cw:"次タブ",ccw:"前タブ",use:"Mac Subでのタブ移動",zmk:"&inc_dec_kp LC(TAB) LC(LS(TAB))"},
  4:{cw:"音量アップ",ccw:"音量ダウン",use:"通常操作の音量調整",zmk:"&inc_dec_kp C_VOL_UP C_VOL_DN"},

  10:{cw:"なし",ccw:"なし",use:"管理レイヤーでは未割り当て",zmk:"未設定"}
};

let activeLayer = 0;

function keyName(token){return labels[token] || token;}

function shortcutName(token){
  return shortcutNames[token] || token
    .replaceAll("LC","Ctrl")
    .replaceAll("LG","Cmd")
    .replaceAll("LA","Alt")
    .replaceAll("LS","Shift");
}

function parseBinding(raw){
  if(raw === "&trans") return {main:"trans",top:"",cat:"trans",flag:""};
  if(raw === "&bootloader") return {main:"BOOT",top:"注意",cat:"danger",flag:"!"};
  if(raw === "&win_switch") return {main:"Winへ",top:"L0+BT0",cat:"macro",flag:""};
  if(raw === "&mac_switch") return {main:"Macへ",top:"L2+BT1",cat:"macro",flag:""};
  if(raw === "&and_switch") return {main:"Andへ",top:"L4+BT2",cat:"macro",flag:""};
  if(raw === "&pad_switch") return {main:"iPadへ",top:"L6+BT3",cat:"macro",flag:""};

  let m = raw.match(/^&bt BT_SEL (\d)$/);
  if(m) return {main:"BT "+m[1],top:"接続先のみ",cat:"bt",flag:"?"};
  if(raw === "&bt BT_CLR") return {main:"BT CLR",top:"削除",cat:"bt",flag:"!"};

  m = raw.match(/^&lt (\d+) ([A-Z0-9_]+)$/);
  if(m){
    const tap = keyName(m[2]);
    const cat = m[2].startsWith("LANG") ? "sym" : "lyr";
    return {main:tap,top:"tap / hold→L"+m[1],cat,flag:""};
  }

  m = raw.match(/^&mt ([A-Z0-9_]+) ([A-Z0-9_]+)$/);
  if(m){
    return {main:keyName(m[2]),top:"tap / hold→"+keyName(m[1]),cat:"lyr",flag:""};
  }

  m = raw.match(/^&mkp ([A-Z0-9_]+)$/);
  if(m) return {main:keyName(m[1]),top:"mouse",cat:"mouse",flag:""};

  m = raw.match(/^&kp (.+)$/);
  if(m){
    const token = m[1];
    if(token.includes("(")) return {main:shortcutName(token),top:"macro",cat:"macro",flag:""};
    if(token.startsWith("LANG")) return {main:keyName(token),top:"IME",cat:"sym",flag:""};
    if(/^(L|R)?(CTL|ALT|GUI|SHFT)$/.test(token) || ["TAB","ESC","BSPC","RET","DEL","UP","DOWN","LEFT","RIGHT"].includes(token) || /^F\d+$/.test(token)){
      return {main:keyName(token),top:"",cat:"mod",flag:""};
    }
    return {main:keyName(token),top:"",cat:"plain",flag:""};
  }

  return {main:raw,top:"",cat:"plain",flag:""};
}

function keyEl(raw, idx){
  const p = parseBinding(raw);
  const el = document.createElement("div");
  el.className = "k " + p.cat + (p.flag ? " flag" : "") + ((idx === 16 || idx === 21) ? " home" : "");
  if(p.flag) el.dataset.flag = p.flag;
  el.title = raw + " / index " + idx;
  el.innerHTML = `<span class="t">${p.top}</span><span class="m">${p.main}</span><span class="zmk">${raw}</span>`;
  return el;
}

function renderColumns(target, cols, keys){
  const root = document.getElementById(target);
  root.innerHTML = "";
  cols.forEach(col => {
    const c = document.createElement("div");
    c.className = "col";
    c.style.marginTop = col.mt + "px";
    col.idx.forEach(idx => c.appendChild(keyEl(keys[idx], idx)));
    root.appendChild(c);
  });
}

function renderThumbs(target, indices, keys, includeTrackball){
  const root = document.getElementById(target);
  root.innerHTML = "";
  indices.forEach(idx => root.appendChild(keyEl(keys[idx], idx)));
  if(includeTrackball){
    const gap1 = document.createElement("div");
    gap1.style.width = "4px";
    const ball = document.createElement("div");
    ball.className = "trackball";
    ball.innerHTML = "TRACK<br>BALL";
    root.appendChild(gap1);
    root.appendChild(ball);
  }
}

function renderTabs(){
  const groups = {base:document.getElementById("baseTabs"),sub:document.getElementById("subTabs"),common:document.getElementById("commonTabs")};
  Object.values(groups).forEach(el => el.innerHTML = "");
  layers.forEach(layer => {
    const b = document.createElement("button");
    b.textContent = layer.name;
    b.className = layer.id === activeLayer ? "active" : "";
    b.addEventListener("click", () => { activeLayer = layer.id; render(); });
    groups[layer.group].appendChild(b);
  });
}

function importantRows(layer){
  const rows = [];
  layer.keys.forEach(raw => {
    const p = parseBinding(raw);
    if(["lyr","sym","macro","bt","danger"].includes(p.cat) && raw !== "&trans"){
      rows.push([p.main, p.top || p.cat, raw]);
    }
  });
  return rows.slice(0, 12);
}

function summaryFor(layer){
  const isBase = layer.group === "base";
  const isSub = layer.group === "sub";
  const isManage = layer.id === 10;
  const isSym = layer.id === 8;
  const isNav = layer.id === 9;
  const design = isBase ? "OSごとに修飾キーを調整しつつ、文字位置は共通化しています。"
    : isSub ? "Space長押し中に使う、OS別ショートカット集です。"
    : isSym ? "左サム英数(LANG2)長押しで呼び出す記号/数字レイヤーです。"
    : isNav ? "右サムRET長押し（またはMINUS長押し）で呼び出すナビ/ファンクションレイヤーです。"
    : "BT接続とOSレイヤー切替をまとめた管理レイヤーです。";
  const caution = isManage ? "BT 0-3は接続先だけ変更します。普段はWinへ/Macへ等のOS切替マクロがおすすめです。"
    : isNav ? "RETを長押しするとL9に入ります。連続Enter入力時の癖がある場合は実機で要確認です。"
    : "tap/holdキーは押下時間の好みに合わせてZMK側の調整余地があります。";
  return `
    <div class="summary-item good"><strong>入り方</strong><span>${activation[layer.id]}</span></div>
    <div class="summary-item"><strong>設計意図</strong><span>${design}</span></div>
    <div class="summary-item ${isManage || isNav ? "warn" : ""}"><strong>注意点</strong><span>${caution}</span></div>
  `;
}

function encoderFor(layer){
  const enc = encoders[layer.id] || encoders[10];
  const isEmpty = enc.zmk === "未設定";
  return `
    <div class="summary-item ${isEmpty ? "warn" : "good"}"><strong>時計回り</strong><span>${enc.cw}</span></div>
    <div class="summary-item ${isEmpty ? "warn" : "good"}"><strong>反時計回り</strong><span>${enc.ccw}</span></div>
    <div class="summary-item"><strong>用途</strong><span>${enc.use}</span></div>
    <div class="summary-item"><strong>ZMK</strong><span><code>${enc.zmk}</code></span></div>
  `;
}

function validate(){
  const ok = layers.every(l => l.keys.length === 51);
  const layoutFlat = [...layout.leftMain.flatMap(c=>c.idx), ...layout.leftThumbs, ...layout.rightMain.flatMap(c=>c.idx), ...layout.rightThumbs];
  const uniqueCount = new Set(layoutFlat).size;
  const layoutOk = layoutFlat.length === 51 && uniqueCount === 51;
  
  if(ok && layoutOk){
    document.getElementById("countBadge").textContent = "All layers: 51 keys OK (No duplicates)";
    document.getElementById("countBadge").style.borderColor = "rgba(16,185,129,.7)";
    document.getElementById("countBadge").style.color = "#bbf7d0";
  } else {
    document.getElementById("countBadge").textContent = "Error: Key count mismatch or duplicate index";
    document.getElementById("countBadge").style.borderColor = "rgba(239,68,68,.8)";
    document.getElementById("countBadge").style.color = "#fecaca";
  }
  return ok && layoutOk;
}

function render(){
  const layer = layers.find(l => l.id === activeLayer);
  renderTabs();
  document.getElementById("layerTitle").textContent = layer.name;
  document.getElementById("layerSubtitle").textContent = layer.desc;
  document.getElementById("layerHeading").textContent = layer.name + " — " + layer.desc;
  renderColumns("leftMain", layout.leftMain, layer.keys);
  renderThumbs("leftThumbs", layout.leftThumbs, layer.keys, false);
  renderColumns("rightMain", layout.rightMain, layer.keys);
  renderThumbs("rightThumbs", layout.rightThumbs, layer.keys, true);
  document.getElementById("summary").innerHTML = summaryFor(layer);
  document.getElementById("encoderSummary").innerHTML = encoderFor(layer);
  document.getElementById("importantTable").innerHTML = importantRows(layer).map(([main,top,raw]) => `<tr><td><strong>${main}</strong><br><code>${raw}</code></td><td>${top}</td></tr>`).join("");
  document.getElementById("statusText").textContent = `${layer.name}: ${layer.keys.length} keys / index 0-50`;
}

document.getElementById("toggleZmk").addEventListener("click", () => {
  document.body.classList.toggle("show-zmk");
  document.getElementById("toggleZmk").textContent = document.body.classList.contains("show-zmk") ? "ZMK記法を隠す" : "ZMK記法を表示";
});

validate();
render();
</script>
